<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0b10">
<link rel="manifest" href="manifest.json">
<title>Life Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b10; --bg2: #0f1018; --bg3: #14161f; --bg4: #1a1d27;
  --border: #2a2d3a; --text: #e0e0e8; --text2: #8a8d9e; --text3: #4a4d5e;
  --green: #22c55e; --red: #ef4444; --orange: #f97316;
  --yellow: #eab308; --blue: #3b82f6; --purple: #a855f7; --pink: #ec4899;
  --gray: #6b7280; --cyan: #06b6d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: linear-gradient(145deg, var(--bg), var(--bg2), var(--bg3));
  color: var(--text); min-height: 100vh; min-height: 100dvh;
  max-width: 520px; margin: 0 auto; -webkit-font-smoothing: antialiased;
  padding-bottom: 72px;
}
button, input, select, textarea { font-family: inherit; }
input, select, textarea {
  padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 14px; outline: none; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }
textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
.btn {
  padding: 10px 16px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #16a34a; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); }
.btn-danger { background: var(--red); color: #fff; }
.pill {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-size: 11px;
  font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.pill.active { border-color: var(--green); background: rgba(34,197,94,0.07); color: var(--green); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
.fade-up { animation: fadeUp 0.25s ease both; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }

/* ── LOGIN ── */
#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; text-align: center; }
#login-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.03em; }
#login-screen p { color: var(--text3); font-size: 13px; margin-bottom: 32px; }
#login-screen .btn { font-size: 15px; padding: 14px 32px; border-radius: 12px; }

/* ── HEADER ── */
#app { display: none; }
.header { padding: 20px 20px 12px; border-bottom: 1px solid var(--bg4); position: sticky; top: 0; background: var(--bg); z-index: 10; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.header .date { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

/* ── SEARCH BAR ── */
.search-bar {
  margin: 0 -20px; padding: 0 20px 12px;
}
.search-input {
  width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--green); }
.search-input::placeholder { color: var(--text3); }
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--text3); pointer-events: none;
}
.search-results { margin-top: 8px; }
.search-result-item {
  padding: 10px 12px; border-radius: 8px; background: var(--bg3);
  border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer;
  transition: border-color 0.2s;
}
.search-result-item:hover { border-color: var(--green); }
.search-result-type { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.search-result-text { font-size: 13px; margin-top: 2px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--bg4);
  display: flex; justify-content: center; max-width: 520px; margin: 0 auto;
  z-index: 100; padding: 4px 0 env(safe-area-inset-bottom, 4px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 4px; background: none; border: none; color: var(--text3);
  font-size: 10px; font-weight: 500; cursor: pointer; transition: color 0.2s;
  max-width: 72px; position: relative;
}
.nav-btn .nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--green); }
.nav-badge {
  position: absolute; top: 2px; right: calc(50% - 18px);
  background: var(--red); color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 8px; min-width: 16px; text-align: center;
}

/* ── CONTENT ── */
.content { padding: 16px 20px; display: none; }
.content.active { display: block; }
.pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; }
.pills::-webkit-scrollbar { display: none; }
.section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; font-weight: 600; }

/* ── CARDS ── */
.card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px; margin-bottom: 10px; transition: all 0.2s;
}
.card:active { transform: scale(0.98); }

/* ── TASK ITEMS ── */
.task-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 14px 0;
  border-bottom: 1px solid var(--bg3); transition: opacity 0.3s; cursor: pointer;
}
.task-check {
  width: 24px; height: 24px; border-radius: 7px; border: 2px solid;
  background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.task-check:hover { transform: scale(1.1); }
.task-check.done { background: var(--green); border-color: var(--green); }
.task-title { font-size: 13px; font-weight: 500; color: #e8e8f0; line-height: 1.4; word-break: break-word; }
.task-title.done { color: var(--text3); text-decoration: line-through; }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
.task-notes { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.4; word-break: break-word; }
.task-due { font-size: 10px; font-weight: 500; }
.task-due.overdue { color: var(--red); }
.task-due.today { color: var(--orange); }
.task-due.upcoming { color: var(--blue); }

/* ── SHOP ITEMS ── */
.shop-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--bg4);
}
.shop-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  background: transparent; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; font-size: 11px; color: #000;
}
.shop-check.done { border-color: var(--green); background: var(--green); }
.shop-cat-label {
  font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;
  padding: 12px 0 6px; font-weight: 600; border-bottom: 1px solid var(--bg4);
}

/* ── ADD FORM ── */
.add-form {
  background: var(--bg3); border-radius: 12px; padding: 16px;
  margin-bottom: 16px; border: 1px solid var(--border); animation: fadeUp 0.2s ease;
}
.add-form .row { display: flex; gap: 8px; margin-bottom: 10px; }

/* ── INBOX ── */
.inbox-input-wrap { position: relative; margin-bottom: 20px; }
.inbox-input {
  width: 100%; padding: 16px; padding-right: 52px; border-radius: 14px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: 15px; outline: none;
}
.inbox-input:focus { border-color: var(--green); }
.inbox-input::placeholder { color: var(--text3); }
.inbox-send {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 10px; border: none;
  background: var(--green); color: #000; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── IDEAS ── */
.idea-card { cursor: pointer; }
.idea-card .idea-text { font-size: 14px; line-height: 1.5; margin-bottom: 8px; word-break: break-word; }
.idea-card .idea-meta { font-size: 10px; color: var(--text3); display: flex; gap: 8px; align-items: center; }
.idea-actions { display: flex; gap: 6px; margin-top: 10px; }

/* ── PROJECTS ── */
.project-card { cursor: pointer; }
.project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.project-name { font-size: 15px; font-weight: 600; }
.project-progress { height: 4px; background: var(--bg); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
.project-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.project-stat { font-size: 11px; color: var(--text3); }

/* ── LISTS ── */
.list-card { cursor: pointer; }
.list-icon { font-size: 24px; margin-bottom: 6px; }
.list-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.list-count { font-size: 11px; color: var(--text3); }

/* ── DETAIL VIEWS (overlay) ── */
.detail-view {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 200; overflow-y: auto;
  max-width: 520px; margin: 0 auto;
  animation: fadeUp 0.2s ease;
}
.detail-header {
  padding: 16px 20px; border-bottom: 1px solid var(--bg4);
  display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
  background: var(--bg); z-index: 1;
}
.detail-back {
  background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; padding: 4px;
}
.detail-title { font-size: 17px; font-weight: 600; flex: 1; }
.detail-body { padding: 16px 20px; padding-bottom: 100px; }

/* ── EMPTY STATES ── */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty .icon { font-size: 36px; margin-bottom: 8px; }
.empty .msg { font-size: 13px; }

/* ── ERROR ── */
.error-banner {
  margin: 12px 20px 0; padding: 10px 14px; border-radius: 8px;
  background: #2d1215; border: 1px solid #5c2126; color: #f87171;
  font-size: 12px; display: flex; justify-content: space-between; align-items: center;
}

/* ── COMPLETED SECTION ── */
.completed-header {
  padding: 10px 14px; border-radius: 8px; background: #0d1017;
  border: 1px solid #1e293b; color: var(--text3); font-size: 13px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  width: 100%; margin-top: 20px;
}

/* ── AI CHAT ── */
.ai-fab {
  position: fixed; bottom: 80px; right: 16px; width: 52px; height: 52px;
  border-radius: 50%; background: linear-gradient(135deg, #a855f7, #6366f1);
  border: none; color: #fff; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(139,92,246,0.4); z-index: 90;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.ai-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(139,92,246,0.6); }
.ai-fab:active { transform: scale(0.95); }

.ai-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 300; max-width: 520px; margin: 0 auto;
  display: flex; flex-direction: column; animation: fadeUp 0.2s ease;
}
.ai-header {
  padding: 16px 20px; border-bottom: 1px solid var(--bg4);
  display: flex; align-items: center; gap: 12px;
}
.ai-header-title { flex: 1; font-size: 17px; font-weight: 600; }
.ai-header-subtitle { font-size: 11px; color: var(--text3); }
.ai-close {
  background: none; border: none; color: var(--text2); font-size: 22px;
  cursor: pointer; padding: 4px;
}
.ai-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.ai-msg {
  max-width: 88%; padding: 10px 14px; border-radius: 12px;
  font-size: 13px; line-height: 1.6; word-break: break-word;
  white-space: pre-wrap;
}
.ai-msg.user {
  align-self: flex-end; background: var(--purple); color: #fff;
  border-bottom-right-radius: 4px;
}
.ai-msg.assistant {
  align-self: flex-start; background: var(--bg3); border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.ai-msg.assistant a { color: var(--blue); }
.ai-msg.thinking {
  align-self: flex-start; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); font-style: italic;
}
.ai-input-row {
  padding: 12px 16px; border-top: 1px solid var(--bg4);
  display: flex; gap: 8px; background: var(--bg);
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
}
.ai-input {
  flex: 1; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: 14px; outline: none;
}
.ai-input:focus { border-color: var(--purple); }
.ai-input::placeholder { color: var(--text3); }
.ai-send-btn {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #a855f7, #6366f1);
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ai-send-btn:disabled { opacity: 0.4; cursor: default; }
.ai-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0 20px 12px;
}
.ai-suggestion {
  padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2); font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.ai-suggestion:hover { border-color: var(--purple); color: var(--purple); }
.ai-settings-row {
  padding: 8px 20px; display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text3);
}
.ai-settings-row input {
  flex: 1; padding: 6px 10px; font-size: 11px;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <h1>Life Dashboard</h1>
  <p>Capture ideas, manage tasks, get things done</p>
  <button class="btn btn-primary" onclick="handleAuth()" id="login-btn">Sign in with Google</button>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-row">
      <div>
        <h1 id="view-title">Inbox</h1>
        <p class="date" id="date-display"></p>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="toggleSearch()" id="search-toggle-btn">Search</button>
        <button class="btn btn-ghost btn-sm" onclick="syncAll()" id="sync-btn">Sync</button>
      </div>
    </div>
    <div class="search-bar" id="search-bar" style="display:none">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" placeholder="Search everything..."
               oninput="doSearch(this.value)">
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div id="error-container"></div>

  <!-- ═══ INBOX VIEW ═══ -->
  <div class="content active" id="inbox-view">
    <div class="inbox-input-wrap">
      <input class="inbox-input" id="inbox-input" placeholder="What's on your mind?"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();captureInbox()}">
      <button class="inbox-send" onclick="captureInbox()">+</button>
    </div>
    <div id="inbox-list"></div>
  </div>

  <!-- ═══ TASKS VIEW ═══ -->
  <div class="content" id="tasks-view">
    <div class="pills" id="category-pills"></div>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:16px;border-style:dashed" onclick="toggleAddForm()" id="add-btn">+ Add Task</button>
    <div id="add-form-container"></div>
    <div id="tasks-list"></div>
    <div id="completed-section"></div>
  </div>

  <!-- ═══ SHOPPING VIEW ═══ -->
  <div class="content" id="shopping-view">
    <div style="display:flex;gap:6px;margin-bottom:16px">
      <input id="shop-input" placeholder="Add item..." style="flex:1" onkeydown="if(event.key==='Enter')addShopItem()">
      <select id="shop-cat" style="width:100px;font-size:12px">
        <option value="">Aisle</option>
        <option value="Produce">🥬 Produce</option>
        <option value="Dairy">🥛 Dairy</option>
        <option value="Meat">🥩 Meat</option>
        <option value="Bakery">🍞 Bakery</option>
        <option value="Frozen">🧊 Frozen</option>
        <option value="Drinks">🥤 Drinks</option>
        <option value="Snacks">🍿 Snacks</option>
        <option value="Household">🏠 Household</option>
        <option value="Other">📦 Other</option>
      </select>
      <input id="shop-qty" placeholder="#" style="width:42px;text-align:center" value="1">
      <button class="btn btn-primary" onclick="addShopItem()">+</button>
    </div>
    <div id="shop-list"></div>
  </div>

  <!-- ═══ IDEAS VIEW ═══ -->
  <div class="content" id="ideas-view">
    <div id="ideas-list"></div>
    <div class="empty" id="ideas-empty" style="display:none">
      <div class="icon">💡</div>
      <div class="msg">Capture thoughts in the Inbox — promote them here to develop further</div>
    </div>
  </div>

  <!-- ═══ PROJECTS VIEW ═══ -->
  <div class="content" id="projects-view">
    <button class="btn btn-ghost" style="width:100%;margin-bottom:16px;border-style:dashed" onclick="showAddProject()">+ New Project</button>
    <div id="projects-list"></div>
    <div class="empty" id="projects-empty" style="display:none">
      <div class="icon">🎯</div>
      <div class="msg">Create a project to break big ideas into actionable steps</div>
    </div>
  </div>

  <!-- ═══ LISTS VIEW ═══ -->
  <div class="content" id="lists-view">
    <button class="btn btn-ghost" style="width:100%;margin-bottom:16px;border-style:dashed" onclick="showAddList()">+ New List</button>
    <div id="lists-grid"></div>
    <div class="empty" id="lists-empty" style="display:none">
      <div class="icon">📋</div>
      <div class="msg">Create custom lists for anything — packing, goals, recipes, whatever you need</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('inbox', this)" data-tab="inbox">
      <span class="nav-icon">📥</span>Inbox
    </button>
    <button class="nav-btn" onclick="switchTab('tasks', this)" data-tab="tasks">
      <span class="nav-icon">✅</span>Tasks
    </button>
    <button class="nav-btn" onclick="switchTab('shopping', this)" data-tab="shopping">
      <span class="nav-icon">🛒</span>Shop
    </button>
    <button class="nav-btn" onclick="switchTab('ideas', this)" data-tab="ideas">
      <span class="nav-icon">💡</span>Ideas
    </button>
    <button class="nav-btn" onclick="switchTab('projects', this)" data-tab="projects">
      <span class="nav-icon">🎯</span>Projects
    </button>
    <button class="nav-btn" onclick="switchTab('lists', this)" data-tab="lists">
      <span class="nav-icon">📋</span>Lists
    </button>
  </nav>
</div>

<!-- DETAIL VIEW CONTAINER -->
<div id="detail-container"></div>

<!-- AI CHAT FAB -->
<button class="ai-fab" id="ai-fab" onclick="openAI()" title="Ask Claude" style="display:none">✨</button>

<!-- AI CHAT PANEL -->
<div id="ai-panel" style="display:none"></div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const CLIENT_ID = '724457331852-5jpikras7qjphvgbqg2blfs17m1bu21e.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive.file';
const CALENDAR_ID = 'yon.level@gmail.com';

// Prefixes for Calendar events — each data type gets a unique emoji prefix
const P = {
  TASK: '📋',
  SHOP: '🛒',
  INBOX: '📥',
  IDEA: '💡',
  PROJECT: '🎯',
  LIST: '📋L',
  LIST_ITEM: '📋I',
};

let tokenClient, accessToken = null;
let tasks = [], shopItems = [], inboxItems = [], ideas = [], projects = [], customLists = [];
let activeCategory = 'all';
let showAddFormVisible = false;
let currentTab = 'inbox';
let showCompletedTasks = false;
let searchVisible = false;

// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
// GOOGLE AUTH
// ══════════════════════════════════════════════════
function initGsi() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (response) => {
      if (response.error) { showError('Auth failed: ' + response.error); return; }
      accessToken = response.access_token;
      localStorage.setItem('dash-token', accessToken);
      showApp();
    },
  });

  const stored = localStorage.getItem('dash-token');
  if (stored) {
    accessToken = stored;
    fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=1', {
      headers: { Authorization: 'Bearer ' + accessToken }
    }).then(r => {
      if (r.ok) { showApp(); }
      else {
        accessToken = null; localStorage.removeItem('dash-token');
        tokenClient.requestAccessToken({ prompt: '' });
      }
    }).catch(() => {
      tokenClient.requestAccessToken({ prompt: '' });
    });
  }
}

function handleAuth() { tokenClient.requestAccessToken({ prompt: '' }); }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateDate();
  syncAll();
}

// ══════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════
async function calFetch(url, opts = {}) {
  const r = await fetch('https://www.googleapis.com/calendar/v3' + url, {
    ...opts,
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json', ...opts.headers },
  });
  if (r.status === 401) {
    accessToken = null; localStorage.removeItem('dash-token');
    document.getElementById('login-screen').style.display = '';
    document.getElementById('app').style.display = 'none';
    throw new Error('Session expired. Please sign in again.');
  }
  if (!r.ok) throw new Error('API error: ' + r.status);
  if (r.status === 204) return null;
  return r.json();
}

async function createEvent(prefix, title, description, dateStr) {
  const d = dateStr || new Date().toISOString().split('T')[0];
  return calFetch(`/calendars/${encodeURIComponent(CALENDAR_ID)}/events`, {
    method: 'POST',
    body: JSON.stringify({
      summary: prefix + ' ' + title,
      description: description || '',
      start: { date: d },
      end: { date: d },
    }),
  });
}

async function updateEvent(id, data) {
  return calFetch(`/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${id}`, {
    method: 'PATCH',
    body: JSON.stringify(data),
  });
}

async function deleteEvent(id) {
  return calFetch(`/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${id}`, { method: 'DELETE' });
}

async function fetchEvents(prefix) {
  const now = new Date();
  const min = new Date(now.getFullYear() - 1, 0, 1).toISOString();
  const max = new Date(now.getFullYear() + 2, 0, 1).toISOString();
  const data = await calFetch(
    `/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${min}&timeMax=${max}&maxResults=500&singleEvents=true&q=${encodeURIComponent(prefix)}`
  );
  return (data.items || []).filter(e => (e.summary || '').includes(prefix));
}

// ══════════════════════════════════════════════════
// SYNC ALL
// ══════════════════════════════════════════════════
async function syncAll() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const [taskEvts, shopEvts, inboxEvts, ideaEvts, projEvts, listEvts, listItemEvts] = await Promise.all([
      fetchEvents(P.TASK),
      fetchEvents(P.SHOP),
      fetchEvents(P.INBOX),
      fetchEvents(P.IDEA),
      fetchEvents(P.PROJECT),
      fetchEvents(P.LIST),
      fetchEvents(P.LIST_ITEM),
    ]);

    tasks = taskEvts.map(parseTask);
    // Sort: active first by priority, then overdue first
    tasks.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      // Overdue tasks first
      if (!a.done && !b.done && a.due && b.due) {
        const da = new Date(a.due), db = new Date(b.due);
        if (da.getTime() !== db.getTime()) return da - db;
      }
      return (PRIS[a.priority]?.order ?? 2) - (PRIS[b.priority]?.order ?? 2);
    });

    shopItems = shopEvts.filter(e => !(e.summary || '').includes(P.TASK)).map(parseShopEvent);

    inboxItems = inboxEvts.filter(e => {
      const s = e.summary || '';
      return !s.includes(P.TASK) && !s.includes(P.IDEA) && !s.includes(P.SHOP);
    }).map(parseInboxEvent);
    inboxItems.sort((a, b) => new Date(b.created) - new Date(a.created));

    ideas = ideaEvts.map(parseIdeaEvent);
    ideas.sort((a, b) => new Date(b.created) - new Date(a.created));

    projects = projEvts.map(parseProjectEvent);

    customLists = listEvts.map(e => parseListEvent(e, listItemEvts));

    renderAll();
  } catch (e) {
    showError(e.message);
  }
  btn.textContent = 'Sync';
  btn.disabled = false;
}

// ══════════════════════════════════════════════════
// PARSERS
// ══════════════════════════════════════════════════
function parseTask(event) {
  const title = (event.summary || '').replace(P.TASK, '').trim();
  const desc = event.description || '';
  const lines = desc.split('\n');
  const meta = lines[0] || '';
  const notes = lines.slice(1).join('\n').trim();
  let category = 'Tasks', priority = 'Medium', due = null;
  for (const cat of Object.keys(CATS)) {
    if (meta.toLowerCase().includes(cat.toLowerCase())) { category = cat; break; }
  }
  for (const p of Object.keys(PRIS)) {
    if (meta.toLowerCase().includes(p.toLowerCase())) { priority = p; break; }
  }
  const dueMatch = meta.match(/due:\s*(\d{4}-\d{2}-\d{2})/i);
  if (dueMatch) due = dueMatch[1];
  const projectMatch = meta.match(/project:\s*(.+?)(?:\||$)/i);
  return {
    id: event.id, title, category, priority, notes, due,
    done: meta.includes('[DONE]'),
    project: projectMatch ? projectMatch[1].trim() : null,
    created: event.created,
  };
}

function parseShopEvent(event) {
  const name = (event.summary || '').replace(P.SHOP, '').trim();
  const desc = event.description || '';
  const qtyMatch = desc.match(/qty:\s*(\d+)/i);
  const checkedMatch = desc.match(/checked:\s*(true|false)/i);
  const catMatch = desc.match(/cat:\s*(.+)/i);
  return {
    id: event.id, name,
    qty: qtyMatch ? qtyMatch[1] : '1',
    checked: checkedMatch ? checkedMatch[1] === 'true' : false,
    category: catMatch ? catMatch[1].trim() : '',
  };
}

function parseInboxEvent(event) {
  const text = (event.summary || '').replace(P.INBOX, '').trim();
  const desc = event.description || '';
  return { id: event.id, text, notes: desc, created: event.created };
}

function parseIdeaEvent(event) {
  const text = (event.summary || '').replace(P.IDEA, '').trim();
  const desc = event.description || '';
  const statusMatch = desc.match(/status:\s*(.+)/i);
  const notesLines = desc.split('\n').filter(l => !l.match(/^status:/i));
  return {
    id: event.id, text,
    notes: notesLines.join('\n').trim(),
    status: statusMatch ? statusMatch[1].trim() : 'raw',
    created: event.created,
  };
}

function parseProjectEvent(event) {
  const name = (event.summary || '').replace(P.PROJECT, '').trim();
  const desc = event.description || '';
  const statusMatch = desc.match(/status:\s*(.+)/i);
  const goalMatch = desc.match(/goal:\s*(.+)/i);
  return {
    id: event.id, name,
    goal: goalMatch ? goalMatch[1].trim() : '',
    status: statusMatch ? statusMatch[1].trim() : 'active',
    created: event.created,
  };
}

function parseListEvent(event, listItemEvts) {
  const name = (event.summary || '').replace(P.LIST, '').trim();
  const desc = event.description || '';
  const iconMatch = desc.match(/icon:\s*(.+)/i);
  const listId = event.id;
  const items = listItemEvts
    .filter(e => (e.description || '').includes('list:' + listId))
    .map(e => {
      const text = (e.summary || '').replace(P.LIST_ITEM, '').trim();
      const d = e.description || '';
      const checkedMatch = d.match(/checked:\s*(true|false)/i);
      return {
        id: e.id, text,
        checked: checkedMatch ? checkedMatch[1] === 'true' : false,
      };
    });
  return {
    id: listId, name,
    icon: iconMatch ? iconMatch[1].trim() : '📝',
    items,
  };
}

function toggleSearch() {
  searchVisible = !searchVisible;
  const bar = document.getElementById('search-bar');
  bar.style.display = searchVisible ? '' : 'none';
  if (searchVisible) {
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
    setTimeout(() => document.getElementById('search-input').focus(), 50);
  }
}

function doSearch(query) {
  const container = document.getElementById('search-results');
  if (!query || query.length < 2) { container.innerHTML = ''; return; }
  const q = query.toLowerCase();
  const results = [];

  inboxItems.forEach(i => {
    if (i.text.toLowerCase().includes(q))
      results.push({ type: 'inbox', icon: '📥', text: i.text, id: i.id });
  });
  tasks.forEach(t => {
    if (t.title.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q))
      results.push({ type: 'task', icon: '✅', text: t.title, id: t.id, done: t.done });
  });
  shopItems.forEach(s => {
    if (s.name.toLowerCase().includes(q))
      results.push({ type: 'shop', icon: '🛒', text: s.name, id: s.id });
  });
  ideas.forEach(i => {
    if (i.text.toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q))
      results.push({ type: 'idea', icon: '💡', text: i.text, id: i.id });
  });
  projects.forEach(p => {
    if (p.name.toLowerCase().includes(q) || (p.goal||'').toLowerCase().includes(q))
      results.push({ type: 'project', icon: '🎯', text: p.name, id: p.id });
  });
  customLists.forEach(l => {
    if (l.name.toLowerCase().includes(q))
      results.push({ type: 'list', icon: l.icon, text: l.name, id: l.id });
    l.items.forEach(item => {
      if (item.text.toLowerCase().includes(q))
        results.push({ type: 'list item', icon: '📝', text: item.text + ' (' + l.name + ')', id: l.id });
    });
  });

  if (results.length === 0) {
    container.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:12px;text-align:center">No results found</div>';
    return;
  }

  container.innerHTML = results.slice(0, 20).map(r => `
    <div class="search-result-item fade-up" onclick="goToSearchResult('${r.type}','${r.id}')">
      <div class="search-result-type">${r.icon} ${r.type}${r.done ? ' (done)' : ''}</div>
      <div class="search-result-text">${esc(r.text)}</div>
    </div>
  `).join('');
}

function goToSearchResult(type, id) {
  toggleSearch();
  const tabMap = { inbox: 'inbox', task: 'tasks', shop: 'shopping', idea: 'ideas', project: 'projects', list: 'lists', 'list item': 'lists' };
  const tab = tabMap[type];
  if (tab) switchTab(tab, document.querySelector(`[data-tab="${tab}"]`));
  if (type === 'task') editTask(id);
  else if (type === 'idea') editIdea(id);
  else if (type === 'project') openProject(id);
  else if (type === 'list' || type === 'list item') openList(id);
}

function renderPills() {
  const container = document.getElementById('category-pills');
  const active = tasks.filter(t => !t.done);
  let html = `<button class="pill ${activeCategory==='all'?'active':''}" onclick="setCategory('all')">All (${active.length})</button>`;
  for (const [name, info] of Object.entries(CATS)) {
    const count = active.filter(t => t.category === name).length;
    if (count === 0) continue;
    const isActive = activeCategory === name;
    html += `<button class="pill" style="${isActive ? `border-color:${info.color};background:${info.color}12;color:${info.color}` : ''}" onclick="setCategory('${name}')">${info.icon} ${name} (${count})</button>`;
  }
  container.innerHTML = html;
}

function renderTasks() {
  const container = document.getElementById('tasks-list');
  const active = tasks.filter(t => !t.done);
  const completed = tasks.filter(t => t.done);
  const filtered = activeCategory === 'all' ? active : active.filter(t => t.category === activeCategory);

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">📝</div><div class="msg">${tasks.length === 0 ? 'No tasks yet' : 'No tasks in this category'}</div></div>`;
  } else {
    container.innerHTML = filtered.map((t, i) => renderTaskItem(t, i)).join('');
  }

  // Completed section
  const compSection = document.getElementById('completed-section');
  if (completed.length === 0) {
    compSection.innerHTML = '';
    return;
  }
  compSection.innerHTML = `
    <button class="completed-header" onclick="showCompletedTasks=!showCompletedTasks;renderTasks()">
      <span>Completed (${completed.length})</span>
      <span>${showCompletedTasks ? '▲' : '▼'}</span>
    </button>
    ${showCompletedTasks ? completed.map((t, i) => `
      <div class="task-item" style="opacity:0.5" onclick="editTask('${t.id}')">
        <button class="task-check done" style="border-color:var(--green)" onclick="event.stopPropagation();uncompleteTask('${t.id}')">✓</button>
        <div style="flex:1;min-width:0">
          <div class="task-title done">${esc(t.title)}</div>
        </div>
        <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px" onclick="event.stopPropagation();permanentDeleteTask('${t.id}')">x</button>
      </div>
    `).join('') : ''}
  `;
}

function renderTaskItem(t, i) {
  const cat = CATS[t.category] || CATS.Tasks;
  const pri = PRIS[t.priority] || PRIS.Medium;
  const dueHtml = t.due ? `<span class="task-due ${getDueClass(t.due)}">${formatDue(t.due)}</span>` : '';
  return `
    <div class="task-item fade-up" data-task="${t.id}" style="animation-delay:${i * 0.03}s" onclick="editTask('${t.id}')">
      <button class="task-check" style="border-color:${pri.color}40" onclick="event.stopPropagation();completeTask('${t.id}')" title="Complete"></button>
      <div style="flex:1;min-width:0">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span class="tag" style="background:${cat.color}15;color:${cat.color}">${cat.icon} ${t.category}</span>
          <span class="tag" style="background:${pri.color}15;color:${pri.color}">${t.priority}</span>
          ${t.project ? `<span class="tag" style="background:var(--cyan)15;color:var(--cyan)">🎯 ${esc(t.project)}</span>` : ''}
          ${dueHtml}
        </div>
        ${t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : ''}
      </div>
    </div>`;
}

function getDueClass(due) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00'); d.setHours(0,0,0,0);
  const diff = (d - today) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  return 'upcoming';
}

function formatDue(due) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00'); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < -1) return Math.abs(diff) + 'd overdue';
  if (diff === -1) return 'Yesterday';
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff < 7) return d.toLocaleDateString('en-GB', { weekday: 'short' });
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

async function completeTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const el = document.querySelector(`[data-task="${id}"]`);
  if (el) el.style.opacity = '0.3';
  try {
    // Mark done in description instead of deleting
    const metaParts = [t.category, t.priority + ' priority', '[DONE]'];
    if (t.due) metaParts.push('due: ' + t.due);
    if (t.project) metaParts.push('project: ' + t.project);
    const desc = metaParts.join(' | ') + (t.notes ? '\n' + t.notes : '');
    await updateEvent(id, { description: desc });
    t.done = true;
    renderAll();
  } catch (e) {
    showError('Failed to complete: ' + e.message);
    if (el) el.style.opacity = '1';
  }
}

async function uncompleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  try {
    const metaParts = [t.category, t.priority + ' priority'];
    if (t.due) metaParts.push('due: ' + t.due);
    if (t.project) metaParts.push('project: ' + t.project);
    const desc = metaParts.join(' | ') + (t.notes ? '\n' + t.notes : '');
    await updateEvent(id, { description: desc });
    t.done = false;
    renderAll();
  } catch (e) { showError(e.message); }
}

async function permanentDeleteTask(id) {
  try {
    await deleteEvent(id);
    tasks = tasks.filter(t => t.id !== id);
    renderAll();
  } catch (e) { showError(e.message); }
}

  const projOptions = projects.map(p =>

  ).join('');

  showDetail(`
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetail()">&larr;</button>
      <span class="detail-title">Edit Task</span>
      <button class="btn btn-sm btn-primary" id="save-task-btn" onclick="saveTask('${taskId}')">Save</button>
    </div>
    <div class="detail-body">
      <div style="margin-bottom:12px">
        <label style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block">TITLE</label>
        <input id="edit-task-title" value="${esc(t.title)}">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">

async function saveTask(taskId) {
  const title = document.getElementById('edit-task-title').value.trim();
  const cat = document.getElementById('edit-task-cat').value;
  const pri = document.getElementById('edit-task-pri').value;
  const due = document.getElementById('edit-task-due').value;
  const proj = document.getElementById('edit-task-proj').value;
  const notes = document.getElementById('edit-task-notes').value.trim();
  if (!title) return;

  const btn = document.getElementById('save-task-btn');
  btn.textContent = '...'; btn.disabled = true;

  const t = tasks.find(t => t.id === taskId);
  const metaParts = [cat, pri + ' priority'];
  if (t && t.done) metaParts.push('[DONE]');
  if (due) metaParts.push('due: ' + due);
  if (proj) metaParts.push('project: ' + proj);
  const desc = metaParts.join(' | ') + (notes ? '\n' + notes : '');

  try {
    const updateData = {
      summary: P.TASK + ' ' + title,
      description: desc,
    };
    if (due) {
      updateData.start = { date: due };
      updateData.end = { date: due };
    }
    await updateEvent(taskId, updateData);
    closeDetail();
    await syncAll();
  } catch (e) {
    showError(e.message);
    btn.textContent = 'Save'; btn.disabled = false;
  }
}

async function addTask() {
  const title = document.getElementById('add-title').value.trim();
  const cat = document.getElementById('add-cat').value;
  const pri = document.getElementById('add-pri').value;
  const due = document.getElementById('add-due')?.value || '';
  const notes = document.getElementById('add-notes')?.value.trim() || '';
  if (!title) return;

  const addBtn = document.querySelector('#add-form-container .btn-primary');
  if (addBtn) { addBtn.textContent = 'Adding...'; addBtn.disabled = true; }

  try {
    const metaParts = [cat, pri + ' priority'];
    if (due) metaParts.push('due: ' + due);
    const desc = metaParts.join(' | ') + (notes ? '\n' + notes : '');
    await createEvent(P.TASK, title, desc, due || undefined);
    toggleAddForm();
    await syncAll();
  } catch (e) {
    showError('Failed to add: ' + e.message);
    if (addBtn) { addBtn.textContent = 'Add Task'; addBtn.disabled = false; }
  }
}

function toggleAddForm() {
  showAddFormVisible = !showAddFormVisible;

function renderShop() {
  const container = document.getElementById('shop-list');
  const unc = shopItems.filter(i => !i.checked);
  const chk = shopItems.filter(i => i.checked);
  let html = '';

  if (unc.length === 0 && chk.length === 0) {
    html = '<div class="empty"><div class="icon">🛒</div><div class="msg">No items yet</div></div>';
  }

  // Group unchecked by category
  const grouped = {};
  unc.forEach(i => {
    const cat = i.category || '';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(i);
  });

  // Sort categories
  const sortedCats = SHOP_CATS_ORDER.filter(c => grouped[c]);
  // Add any cats not in our order
  Object.keys(grouped).forEach(c => { if (!sortedCats.includes(c)) sortedCats.push(c); });

  sortedCats.forEach(cat => {
    if (cat) {
      const icon = SHOP_CATS_ICONS[cat] || '📦';
      html += `<div class="shop-cat-label">${icon} ${cat}</div>`;
    }
    html += grouped[cat].map(i => `
      <div class="shop-item">
        <button class="shop-check" onclick="toggleShop('${i.id}')"></button>
        <span style="flex:1;font-size:13px">${esc(i.name)}</span>
        <span style="font-size:11px;color:var(--text3);font-family:monospace">${i.qty !== '1' ? 'x' + i.qty : ''}</span>
        <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px" onclick="deleteShop('${i.id}')">x</button>
      </div>`).join('');
  });

  if (chk.length > 0) {
    html += `<div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em">Done (${chk.length})</span>
        <button style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline" onclick="clearShop()">Clear all</button>
      </div>`;
    html += chk.map(i => `
      <div class="shop-item" style="opacity:0.4">
        <button class="shop-check done" onclick="toggleShop('${i.id}')">✓</button>
        <span style="flex:1;font-size:13px;color:var(--text3);text-decoration:line-through">${esc(i.name)}</span>
      </div>`).join('');
    html += '</div>';
  }
  container.innerHTML = html;
}

async function addShopItem() {
  const input = document.getElementById('shop-input');
  const qtyInput = document.getElementById('shop-qty');
  const catSelect = document.getElementById('shop-cat');
  const name = input.value.trim();
  if (!name) return;
  const qty = qtyInput.value || '1';
  const cat = catSelect.value || '';
  input.value = ''; qtyInput.value = '1';
  try {
    await createEvent(P.SHOP, name, `qty: ${qty}\nchecked: false\ncat: ${cat}`);
    await syncAll();
  } catch (e) { showError('Failed to add item: ' + e.message); }
}

async function toggleShop(id) {
  const item = shopItems.find(i => i.id === id);
  if (!item) return;
  item.checked = !item.checked;
  renderShop();
  try {
    await updateEvent(id, { description: `qty: ${item.qty}\nchecked: ${item.checked}\ncat: ${item.category || ''}` });
  } catch (e) {
    item.checked = !item.checked;
    renderShop();
    showError(e.message);
  }
}

async function deleteShop(id) {
  shopItems = shopItems.filter(i => i.id !== id);
  renderShop();
  try { await deleteEvent(id); } catch (e) { showError(e.message); await syncAll(); }
}

async function clearShop() {
  const checked = shopItems.filter(i => i.checked);
  if (checked.length === 0) return;
  shopItems = shopItems.filter(i => !i.checked);
  renderShop();
  try {
    await Promise.all(checked.map(i => deleteEvent(i.id)));
  } catch (e) { showError(e.message); await syncAll(); }
}

          <div class="shop-item">
            <button class="shop-check" onclick="toggleListItem('${item.id}','${list.id}')"></button>
            <span style="flex:1;font-size:13px">${esc(item.text)}</span>
            <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px" onclick="deleteListItem('${item.id}','${list.id}')">x</button>
          </div>
        `).join('')}
        ${checked.length > 0 ? `
          <div style="margin-top:16px">
            <span class="section-title">Done (${checked.length})</span>
            ${checked.map(item => `
              <div class="shop-item" style="opacity:0.4">
                <button class="shop-check done" onclick="toggleListItem('${item.id}','${list.id}')">✓</button>
                <span style="flex:1;font-size:13px;color:var(--text3);text-decoration:line-through">${esc(item.text)}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
        ${list.items.length === 0 ? '<div class="empty"><div class="msg" style="font-size:12px">Empty list — add items above</div></div>' : ''}
      </div>
    </div>
  `);
}

async function addListItem(listId) {
  const input = document.getElementById('list-item-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await createEvent(P.LIST_ITEM, text, `list:${listId}\nchecked: false`);
    await syncAll();
    openList(listId);
  } catch (e) { showError(e.message); }
}

async function toggleListItem(itemId, listId) {
  const list = customLists.find(l => l.id === listId);
  if (!list) return;
  const item = list.items.find(i => i.id === itemId);
  if (!item) return;
  item.checked = !item.checked;
  openList(listId);
  try {
    const event = await calFetch(`/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${itemId}`);
    const desc = (event.description || '').replace(/checked:\s*(true|false)/i, 'checked: ' + item.checked);
    await updateEvent(itemId, { description: desc });
  } catch (e) {
    item.checked = !item.checked;
    openList(listId);
    showError(e.message);
  }
}

async function deleteListItem(itemId, listId) {
  try {
    await deleteEvent(itemId);
    await syncAll();
    openList(listId);
  } catch (e) { showError(e.message); }
}

async function deleteList(listId) {
  const list = customLists.find(l => l.id === listId);
  if (!list) return;
  try {
    await Promise.all([
      deleteEvent(listId),
      ...list.items.map(i => deleteEvent(i.id))
    ]);
    closeDetail();
    await syncAll();
  } catch (e) { showError(e.message); }
}

function switchTab(tab, btn) {
  currentTab = tab;

  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));

function updateBadges() {
  const inboxCount = inboxItems.length;
  const overdueTasks = tasks.filter(t => !t.done && t.due && getDueClass(t.due) === 'overdue').length;
  const activeTaskCount = tasks.filter(t => !t.done).length;
  const uncheckedShop = shopItems.filter(i => !i.checked).length;

  setBadge('inbox', inboxCount);

function setBadge(tab, count) {
  const btn = document.querySelector(`[data-tab="${tab}"]`);
  if (!btn) return;
  let badge = btn.querySelector('.nav-badge');
  if (!count) {
    if (badge) badge.remove();
    return;
  }
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'nav-badge';
    btn.appendChild(badge);
  }
  badge.textContent = count;
}

// ── Error ──
function showError(msg) {
  const c = document.getElementById('error-container');
  c.innerHTML = `<div class="error-banner"><span>${esc(msg)}</span><button style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px" onclick="this.parentElement.remove()">x</button></div>`;
  setTimeout(() => c.innerHTML = '', 5000);
}

// ── Utilities ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return Math.floor(days / 7) + 'w ago';
}

// AI CHAT (Claude)
// ══════════════════════════════════════════════════
const AI_WORKER_KEY = 'dash-ai-worker-url';
let aiMessages = [];
let aiStreaming = false;

function getWorkerUrl() { return localStorage.getItem(AI_WORKER_KEY) || ''; }
function setWorkerUrl(url) { localStorage.setItem(AI_WORKER_KEY, url); updateFabVisibility(); }
function updateFabVisibility() {
  const fab = document.getElementById('ai-fab');
  if (fab) fab.style.display = accessToken ? '' : 'none';
}

function buildSystemPrompt() {
  const today = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const activeTasks = tasks.filter(t => !t.done);
  const doneTasks = tasks.filter(t => t.done);
  const overdue = activeTasks.filter(t => t.due && getDueClass(t.due) === 'overdue');
  const dueToday = activeTasks.filter(t => t.due && getDueClass(t.due) === 'today');

  const taskList = activeTasks.map(t => {
    let s = `- ${t.title} [${t.category}, ${t.priority}]`;
    if (t.due) s += ` due: ${formatDue(t.due)}`;
    if (t.project) s += ` (project: ${t.project})`;
    if (t.notes) s += ` — ${t.notes.substring(0, 100)}`;
    return s;
  }).join('\n') || '(none)';

  const inboxList = inboxItems.map(i => `- ${i.text} (${timeAgo(i.created)})`).join('\n') || '(none)';

  const ideaList = ideas.map(i => {
    let s = `- ${i.text} [${i.status}]`;
    if (i.notes) s += ` — ${i.notes.substring(0, 100)}`;
    return s;
  }).join('\n') || '(none)';

  const projList = projects.map(p => {
    const pt = tasks.filter(t => t.project === p.name);
    const done = pt.filter(t => t.done).length;
    return `- ${p.name}: ${done}/${pt.length} tasks done${p.goal ? ' — Goal: ' + p.goal : ''}`;
  }).join('\n') || '(none)';

  const shopList = shopItems.filter(i => !i.checked).map(i => {
    let s = `- ${i.name}`;
    if (i.qty !== '1') s += ` x${i.qty}`;
    if (i.category) s += ` [${i.category}]`;
    return s;
  }).join('\n') || '(none)';

  const listsSummary = customLists.map(l => {
    const unc = l.items.filter(i => !i.checked).length;
    return `- ${l.icon} ${l.name}: ${l.items.length} items (${unc} remaining)`;
  }).join('\n') || '(none)';

  return `You are an AI assistant embedded in a personal Life Dashboard app. Today is ${today}.

You help the user manage their life: find tasks, analyze projects, brainstorm ideas, plan their day, and triage their inbox.

Be concise, actionable, and friendly. Use short responses. When suggesting actions, be specific to their actual data.

== CURRENT DATA ==

INBOX (${inboxItems.length} unprocessed):
${inboxList}

ACTIVE TASKS (${activeTasks.length}):
${taskList}
${overdue.length > 0 ? `\n⚠️ OVERDUE (${overdue.length}): ${overdue.map(t => t.title).join(', ')}` : ''}
${dueToday.length > 0 ? `\n📅 DUE TODAY (${dueToday.length}): ${dueToday.map(t => t.title).join(', ')}` : ''}

COMPLETED TASKS (${doneTasks.length}): ${doneTasks.map(t => t.title).join(', ') || '(none)'}

IDEAS (${ideas.length}):
${ideaList}

PROJECTS (${projects.length}):
${projList}

SHOPPING LIST (${shopItems.filter(i => !i.checked).length} unchecked):
${shopList}

CUSTOM LISTS (${customLists.length}):
${listsSummary}`;
}

function openAI() {
  const panel = document.getElementById('ai-panel');
  const workerUrl = getWorkerUrl();

  panel.style.display = '';
  panel.innerHTML = `
    <div class="ai-panel">
      <div class="ai-header">
        <button class="ai-close" onclick="closeAI()">&larr;</button>
        <div>
          <div class="ai-header-title">✨ Claude</div>
          <div class="ai-header-subtitle">Your life assistant</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="aiMessages=[];openAI()">Clear</button>
      </div>
      ${!workerUrl ? `
        <div class="ai-settings-row" style="flex-direction:column;align-items:stretch;padding:20px">
          <div style="margin-bottom:12px;font-size:13px;color:var(--text)">Enter your Cloudflare Worker URL to enable AI</div>
          <input id="ai-worker-input" placeholder="https://life-dashboard-ai.YOUR-NAME.workers.dev" style="font-size:13px;padding:10px 12px">
          <button class="btn btn-primary" style="margin-top:8px" onclick="setWorkerUrl(document.getElementById('ai-worker-input').value.trim());openAI()">Connect</button>
          <div style="margin-top:16px;font-size:11px;color:var(--text3);line-height:1.6">
            <b>Setup (one-time):</b><br>
            1. Install wrangler: <code>npm i -g wrangler</code><br>
            2. cd into worker/ and run: <code>npx wrangler deploy</code><br>
            3. Set your API key: <code>npx wrangler secret put ANTHROPIC_API_KEY</code><br>
            4. Paste the worker URL above
          </div>
        </div>
      ` : `
        <div class="ai-messages" id="ai-messages">
          ${aiMessages.length === 0 ? `
            <div style="text-align:center;padding:24px 0;color:var(--text3)">
              <div style="font-size:28px;margin-bottom:8px">✨</div>
              <div style="font-size:13px">I can see all your tasks, ideas, and projects.<br>Ask me anything!</div>
            </div>
          ` : aiMessages.map(m => `<div class="ai-msg ${m.role}">${esc(m.content)}</div>`).join('')}
        </div>
        ${aiMessages.length === 0 ? `
          <div class="ai-suggestions">
            <button class="ai-suggestion" onclick="aiAsk('What should I focus on today?')">What should I focus on today?</button>
            <button class="ai-suggestion" onclick="aiAsk('Help me process my inbox')">Process my inbox</button>
            <button class="ai-suggestion" onclick="aiAsk('Which project needs attention?')">Project health check</button>
            <button class="ai-suggestion" onclick="aiAsk('Turn my ideas into action plans')">Ideas → actions</button>
            <button class="ai-suggestion" onclick="aiAsk('Give me a weekly review summary')">Weekly review</button>
          </div>
        ` : ''}
        <div class="ai-input-row">
          <input class="ai-input" id="ai-input" placeholder="Ask Claude..."
                 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend()}">
          <button class="ai-send-btn" id="ai-send-btn" onclick="aiSend()">→</button>
        </div>
        <div class="ai-settings-row">
          <span>Worker:</span>
          <input value="${esc(workerUrl)}" style="font-size:10px;padding:4px 8px" onchange="setWorkerUrl(this.value.trim())">
        </div>
      `}
    </div>
  `;

  if (workerUrl) {
    const msgs = document.getElementById('ai-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => document.getElementById('ai-input')?.focus(), 100);
  }
}

function closeAI() {
  document.getElementById('ai-panel').style.display = 'none';
}

function aiAsk(text) {
  const input = document.getElementById('ai-input');
  if (input) input.value = text;
  aiSend();
}

async function aiSend() {
  const input = document.getElementById('ai-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || aiStreaming) return;
  input.value = '';

  aiMessages.push({ role: 'user', content: text });
  openAI(); // Re-render

  const sendBtn = document.getElementById('ai-send-btn');
  if (sendBtn) sendBtn.disabled = true;
  aiStreaming = true;

  // Add thinking indicator
  const msgs = document.getElementById('ai-messages');
  if (msgs) {
    msgs.innerHTML += '<div class="ai-msg thinking" id="ai-thinking">Thinking...</div>';
    msgs.scrollTop = msgs.scrollHeight;
  }

  try {
    const workerUrl = getWorkerUrl();
    const response = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: buildSystemPrompt(),
        messages: aiMessages.filter(m => m.role === 'user' || m.role === 'assistant'),
      }),
    });

    const data = await response.json();

    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : data.error.message || 'API error');

    const reply = data.content?.[0]?.text || 'No response';
    aiMessages.push({ role: 'assistant', content: reply });
  } catch (e) {
    aiMessages.push({ role: 'assistant', content: '⚠️ Error: ' + e.message });
  }

  aiStreaming = false;
  openAI(); // Re-render with response
}
